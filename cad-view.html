<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CAD Model Viewer <h1>My Portfolio</h1></title>
  <link rel="stylesheet" href="./styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <style>
    .viewer-wrap {
      height: 520px;
      width: 100%;
      background-color: #070b18;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    #placeholder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(18, 26, 51, 0.95);
      color: var(--text);
      font-size: 1.1rem;
      z-index: 10;
      transition: opacity 0.3s ease;
      text-align: center;
      padding: 20px;
    }
    #canvasContainer {
      width: 100%;
      height: 100%;
    }
    .status-bar {
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--muted);
      background: rgba(255,255,255,0.02);
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .back-bar {
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="./index.html">Mechanical Portfolio</a>
      <nav class="nav">
        <a href="./index.html" class="nav-link">Home</a>
        <a href="./fea.html" class="nav-link">FEA</a>
        <a href="./cad.html" class="nav-link">CAD</a>
        <a href="./contact.html" class="nav-link">Contact</a>
        <a href="./upload.html" class="nav-link">Viewer</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <h1 id="modelTitle">CAD Model Viewer</h1>
        <p class="muted" id="modelSubtitle">Initialising viewer engine assets...</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="back-bar">
          <a href="./cad.html" class="btn-link">← Back to CAD Projects</a>
        </div>

        <div class="card" style="padding:14px;">
          <div class="viewer-wrap" id="viewerWrap">
            <div id="placeholder">
              <div style="font-weight: 600; margin-bottom: 4px;">Preparing WebGL Environment</div>
              <span style="font-size: 0.85rem; color: var(--muted);">Establishing rendering viewport profile...</span>
            </div>
            <div id="canvasContainer"></div>
          </div>
          <div class="status-bar" id="viewerStatus">Awaiting dynamic metadata assignment execution...</div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>© <span id="footerYear"></span> Deepak Sethi</span>
      <span class="muted">CAD Assembly Lab Integration Port</span>
    </div>
  </footer>

  <script>
    let container = document.getElementById('canvasContainer');
    let viewerWrap = document.getElementById('viewerWrap');
    let placeholder = document.getElementById('placeholder');
    let titleEl = document.getElementById('modelTitle');
    let subtitleEl = document.getElementById('modelSubtitle');

    let scene, camera, renderer, controls, currentModel;

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0b1020);

      camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.01, 100000);
      camera.position.set(100, 100, 100);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;

      container.appendChild(renderer.domElement);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.maxPolarAngle = Math.PI;

      // Studio Quality Environment Lighting Profiles
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight1.position.set(1, 1.5, 1).normalize();
      dirLight1.castShadow = true;
      scene.add(dirLight1);

      const dirLight2 = new THREE.DirectionalLight(0xaab4d6, 0.4);
      dirLight2.position.set(-1, -0.5, -1).normalize();
      scene.add(dirLight2);

      window.addEventListener('resize', onWindowResize);
      animate();
    }

    function onWindowResize() {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      if (controls) controls.update();
      if (renderer && scene && camera) renderer.render(scene, camera);
    }

    function setStatus(msg, isError = false) {
      const el = document.getElementById('viewerStatus');
      if (!el) return;
      el.innerHTML = msg;
      el.style.color = isError ? '#ff6b6b' : '';
    }

    function frameObject(obj) {
      // Compute bounding box in world space
      const box = new THREE.Box3().setFromObject(obj);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);

      // Shift the model so its centre is at the world origin
      obj.position.sub(center);

      // Recompute box after shift (centre is now ~0,0,0)
      const fov = camera.fov * (Math.PI / 180);
      const dist = (maxDim / 2) / Math.tan(fov / 2) * 2.0;

      camera.position.set(dist, dist * 0.6, dist);
      camera.near = maxDim * 0.001;
      camera.far  = maxDim * 100;
      camera.updateProjectionMatrix();
      camera.lookAt(0, 0, 0);

      if (controls) {
        controls.target.set(0, 0, 0);
        controls.minDistance = maxDim * 0.01;
        controls.maxDistance = maxDim * 20;
        controls.update();
      }
    }

    function loadModel(url) {
      return new Promise((resolve, reject) => {
        const extension = url.split('.').pop().toLowerCase();

        if (extension === 'glb' || extension === 'gltf') {
          const draco = new THREE.DRACOLoader();
          draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
          const loader = new THREE.GLTFLoader();
          loader.setDRACOLoader(draco);

          loader.load(url, (gltf) => {
            if (currentModel) scene.remove(currentModel);
            currentModel = gltf.scene;

            currentModel.traverse((child) => {
              if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
                if (child.material) child.material.side = THREE.DoubleSide;
              }
            });

            scene.add(currentModel);
            frameObject(currentModel);
            setStatus('GLB model loaded successfully.');
            resolve();
          },
          (xhr) => {
            if (xhr.total > 0) {
              setStatus('Downloading: ' + Math.round(xhr.loaded / xhr.total * 100) + '%');
            }
          },
          (err) => { reject(err); });
        } 
        else if (extension === 'stl') {
          const loader = new THREE.STLLoader();
          loader.load(url, (geometry) => {
            if (currentModel) scene.remove(currentModel);

            geometry.computeVertexNormals();
            const material = new THREE.MeshStandardMaterial({
              color: 0x7c5cff,
              roughness: 0.4,
              metalness: 0.3,
              side: THREE.DoubleSide
            });

            currentModel = new THREE.Mesh(geometry, material);
            currentModel.castShadow = true;
            currentModel.receiveShadow = true;

            scene.add(currentModel);
            frameObject(currentModel);
            setStatus('STL Mesh runtime assembly complete.');
            resolve();
          }, 
          (xhr) => {
            if (xhr.total > 0) setStatus(`Downloading geometry: ${Math.round(xhr.loaded / xhr.total * 100)}%`);
          }, 
          (err) => reject(err));
        } 
        else if (extension === 'obj') {
          const loader = new THREE.OBJLoader();
          loader.load(url, (obj) => {
            if (currentModel) scene.remove(currentModel);
            currentModel = obj;

            currentModel.traverse((child) => {
              if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
                child.material = new THREE.MeshStandardMaterial({
                  color: 0x7c5cff,
                  roughness: 0.5,
                  side: THREE.DoubleSide
                });
              }
            });

            scene.add(currentModel);
            frameObject(currentModel);
            setStatus('OBJ contextual mesh layers mapped successfully.');
            resolve();
          }, 
          (xhr) => {}, 
          (err) => reject(err));
        } 
        else {
          reject(new Error(`Unsupported model file extension format: .${extension}`));
        }
      });
    }

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    async function main() {
      init();
      try {
        const id = getQueryParam('id');
        if (!id) throw new Error('Missing unique component structural query asset parameters (?id=...)');

        const res = await fetch('./projects.json');
        if (!res.ok) throw new Error('System pipeline failed to read target projects.json matrix');
        const data = await res.json();
        
        const p = (data.projects || []).find(x => x.id === id);
        if (!p) throw new Error(`Target component tracking index signature sequence "${id}" not found.`);
        if (!p.link) throw new Error('The target engineering blueprint contains no direct binary file model reference route.');

        if (titleEl) titleEl.textContent = p.title;
        if (subtitleEl) subtitleEl.textContent = (p.tools || []).join(' • ') + ' • ' + (p.year || '');

        placeholder.style.display = 'flex';
        setStatus('Initializing file content mapping streams...');

        await loadModel(p.link);
        placeholder.style.display = 'none';
      } catch (e) {
        console.error(e);
        if (placeholder) {
          placeholder.innerHTML = `<div style="color:#ff6b6b; font-weight:bold;">Viewer Pipeline Failure</div><div style="font-size:0.85rem; margin-top:4px;">${e.message || e}</div>`;
        }
        setStatus(e.message || e, true);
      }
    }

    const footerYr = document.getElementById('footerYear');
    if (footerYr) footerYr.textContent = new Date().getFullYear();

    window.onload = main;
  </script>
</body>
</html>
